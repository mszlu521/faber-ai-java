server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: faber-llm-service

  threads:
    virtual:
      enabled: true

  config:
    import:
      - optional:nacos:shared-database.yaml?refreshEnabled=true
      - optional:nacos:shared-redis.yaml?refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?refreshEnabled=true
      - optional:configmap:${spring.application.name}?namespace=${K8S_NAMESPACE:default}
      - optional:secret:${spring.application.name}?namespace=${K8S_NAMESPACE:default}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:15432}/${POSTGRES_DB:faber-ai-java}
    username: ${POSTGRES_USER:mszluai}
    password: ${POSTGRES_PASSWORD:mszlu123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  cloud:
    nacos:
      config:
        enabled: ${NACOS_ENABLED:true}
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:local}
        group: DEFAULT_GROUP
        file-extension: yaml
        grpc:
          server-addr: ${NACOS_GRPC_SERVER:localhost:9848}
        refresh:
          enabled: true
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${spring.cloud.nacos.config.server-addr}
        namespace: ${spring.cloud.nacos.config.namespace}
        group: DEFAULT_GROUP
        ip: ${POD_IP:${spring.cloud.client.ip-address:127.0.0.1}}
        port: ${SERVER_PORT:8084}
        metadata:
          k8s-cluster: ${K8S_CLUSTER_NAME:local}
          version: ${APP_VERSION:1.0.0}

    kubernetes:
      config:
        enabled: ${K8S_CONFIG_ENABLED:true}
        namespace: ${K8S_NAMESPACE:default}
        sources:
          - name: ${spring.application.name}
            namespace: ${K8S_NAMESPACE:default}
      discovery:
        enabled: ${K8S_DISCOVERY_ENABLED:true}
        all-namespaces: false
      client:
        trust-certs: ${K8S_TRUST_CERTS:false}

    loadbalancer:
      ribbon:
        enabled: false
      cache:
        ttl: 5s
        capacity: 256
      health-check:
        interval: 15s
        refetch-instances-interval: 5s

    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: basic
      httpclient:
        hc5:
          enabled: true
      circuitbreaker:
        enabled: true
        group:
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,nacos,db,diskSpace
  metrics:
    tags:
      application: ${spring.application.name}
      version: ${APP_VERSION:1.0.0}
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"
  #  structured:
  #    format:
  #      console: ecs
  level:
    com.mszlu.ai.llm: DEBUG
# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
  type-handlers-package: com.mszlu.ai.common.config
# jwt配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-here-must-be-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:604800000}
  refresh-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}
---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    nacos:
      config:
        namespace: dev
      discovery:
        namespace: dev

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    nacos:
      config:
        namespace: prod
      discovery:
        namespace: prod
