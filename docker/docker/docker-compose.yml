version: '3.8'

services:
  # Redis - 缓存和会话存储
  redis:
    image: redis:7.2.4-alpine
    container_name: faber-redis
    command: redis-server --appendonly yes --requirepass redis123456
    volumes:
      - ${ROOT}/data/redis:/data
    ports:
      - "6379:6379"
    restart: always
    networks:
      - faber-network

  # PostgreSQL - 业务数据库
  postgres:
    image: postgres:18
    container_name: faber-postgres
    environment:
      - POSTGRES_USER=mszluai
      - POSTGRES_PASSWORD=mszlu123456
      - POSTGRES_DB=faber-ai
      - TZ=Asia/Shanghai
      - Locale=zh_CN.UTF-8
    volumes:
      - ${ROOT}/data/postgres:/var/lib/postgresql
      - ./faber-ai.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"
    networks:
      - faber-network
    restart: always
  # MinIO - 对象存储
  minio:
    image: minio/minio:latest
    container_name: faber-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ${ROOT}/data/minio:/data
    networks:
      - faber-network
    restart: always

  # Etcd - Milvus依赖
  etcd:
    container_name: faber-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${ROOT}/data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - faber-network
    restart: always

  # Milvus - 向量数据库
  milvus:
    container_name: faber-milvus
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${ROOT}/data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - faber-network
    restart: always

networks:
  faber-network:
    driver: bridge
    name: faber-network